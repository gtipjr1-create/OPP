<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4A9EFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4A9EFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- Glow halo -->
  <circle cx="256" cy="256" r="180" fill="url(#glowGrad)"/>

  <!-- Outer white ring -->
  <circle cx="256" cy="256" r="168" 
    fill="none" 
    stroke="white" 
    stroke-width="10" 
    stroke-opacity="0.9"/>

  <!-- Inner blue ring -->
  <circle cx="256" cy="256" r="122" 
    fill="none" 
    stroke="#4A9EFF" 
    stroke-width="8" 
    stroke-opacity="0.85"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="22" fill="#4A9EFF"/>

  <!-- Subtle inner glow on center dot -->
  <circle cx="256" cy="256" r="14" fill="white" fill-opacity="0.25"/>
</svg>
